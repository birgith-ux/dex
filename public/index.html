<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF7F2" />
  <title>Dex — Puppy Trainer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="app" id="app">
      <div class="screen-content" id="screen-content">
        <!-- Rendered by JS -->
      </div>
      <nav class="tab-bar" id="tab-bar">
        <button class="tab active" data-tab="vandaag">
          <span class="tab-icon">🐾</span>
          <span class="tab-label">Vandaag</span>
        </button>
        <button class="tab" data-tab="groei">
          <span class="tab-icon">🌱</span>
          <span class="tab-label">Groei</span>
        </button>
        <button class="tab" data-tab="voortgang">
          <span class="tab-icon">📊</span>
          <span class="tab-label">Voortgang</span>
        </button>
        <button class="tab" data-tab="logboek">
          <span class="tab-icon">📓</span>
          <span class="tab-label">Logboek</span>
        </button>
      </nav>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
